<svg width="1250" height="820" xmlns="http://www.w3.org/2000/svg">

  <!-- Header -->
  <text x="50" y="40" font-family="Inter, sans-serif" font-size="18" font-weight="bold">PBPE Marketplace — Architecture Overview</text>

  <!-- Planetary Health OS -->
  <rect x="50" y="60" width="1150" height="80" fill="#eef5ff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="70" y="90" font-family="Inter, sans-serif" font-size="14" font-weight="bold">Planetary Health OS</text>
  <text x="70" y="115" font-family="Inter, sans-serif" font-size="12">Intent / Source / Webhook / Connect / Checkout</text>

  <!-- Marketplace Container -->
  <rect x="50" y="160" width="1150" height="580" fill="#fafafa" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="70" y="190" font-family="Inter, sans-serif" font-size="18" font-weight="bold">PBPE Marketplace</text>

  <!-- Financial Products -->
  <rect x="70" y="220" width="330" height="140" fill="#ffffff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="85" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="bold">1. PBPE Financial Products</text>
  <text x="85" y="265" font-family="Inter, sans-serif" font-size="12">Carbon Income Bond</text>
  <text x="85" y="280" font-family="Inter, sans-serif" font-size="12">Regenerative Agriculture Bond</text>
  <text x="85" y="295" font-family="Inter, sans-serif" font-size="12">Health Impact Bond</text>
  <text x="85" y="310" font-family="Inter, sans-serif" font-size="12">Soil / Coffee / Microbiome Credits</text>
  <text x="85" y="325" font-family="Inter, sans-serif" font-size="12">Preventive Health &amp; Agri Protection</text>

  <!-- Impact Engine -->
  <rect x="450" y="220" width="330" height="140" fill="#ffffff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="465" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="bold">2. PBPE Impact Engine</text>
  <text x="465" y="265" font-family="Inter, sans-serif" font-size="12">Agri / Climate / Health Intents</text>
  <text x="465" y="280" font-family="Inter, sans-serif" font-size="12">PBPE valuation &amp; forecasting</text>
  <text x="465" y="295" font-family="Inter, sans-serif" font-size="12">Volatility &amp; risk inputs</text>

  <!-- Registry & Ledger -->
  <rect x="830" y="220" width="330" height="140" fill="#ffffff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="845" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="bold">3. PBPE Registry &amp; Ledger</text>
  <text x="845" y="265" font-family="Inter, sans-serif" font-size="12">intents, pbpe_values, products</text>
  <text x="845" y="280" font-family="Inter, sans-serif" font-size="12">settlements, distributions</text>
  <text x="845" y="295" font-family="Inter, sans-serif" font-size="12">audit_trail (full traceability)</text>

  <!-- API -->
  <rect x="70" y="390" width="330" height="120" fill="#ffffff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="85" y="415" font-family="Inter, sans-serif" font-size="14" font-weight="bold">4. Marketplace API</text>
  <text x="85" y="435" font-family="Inter, sans-serif" font-size="12">/products, /orders, /market/ticker</text>
  <text x="85" y="450" font-family="Inter, sans-serif" font-size="12">/settlements/{product_id}</text>
  <text x="85" y="465" font-family="Inter, sans-serif" font-size="12">/registry/{pbpe_id}, /portfolio</text>

  <!-- Rating Engine -->
  <rect x="450" y="390" width="330" height="120" fill="#ffffff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="465" y="415" font-family="Inter, sans-serif" font-size="14" font-weight="bold">5. PBPE Risk &amp; Rating Engine</text>
  <text x="465" y="435" font-family="Inter, sans-serif" font-size="12">IRS, DQS, RRS</text>
  <text x="465" y="450" font-family="Inter, sans-serif" font-size="12">PVI, PDP → PCRS → A/B/C/D</text>

  <!-- Settlement -->
  <rect x="830" y="390" width="330" height="120" fill="#ffffff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="845" y="415" font-family="Inter, sans-serif" font-size="14" font-weight="bold">6. Settlement &amp; Distribution</text>
  <text x="845" y="435" font-family="Inter, sans-serif" font-size="12">Executes 40/40/20</text>
  <text x="845" y="450" font-family="Inter, sans-serif" font-size="12">Actor / PBPE Funds / Platform</text>

  <!-- Dashboards -->
  <rect x="70" y="540" width="1090" height="180" fill="#ffffff" stroke="#333" stroke-width="1.3" rx="7" ry="7"/>
  <text x="85" y="565" font-family="Inter, sans-serif" font-size="14" font-weight="bold">7. Dashboards</text>
  <text x="85" y="585" font-family="Inter, sans-serif" font-size="12">Investor Dashboard: portfolio, PBPE yield, risk, impact</text>
  <text x="85" y="600" font-family="Inter, sans-serif" font-size="12">Issuer Dashboard: issuance, MRV status, settlements</text>
  <text x="85" y="615" font-family="Inter, sans-serif" font-size="12">Impact Views: CO&#x2082;, soil, MBT55, medical cost, water</text>

</svg>
