<svg width="1250" height="820" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#ffffff; stroke:#333; stroke-width:1.3; rx:7; ry:7; }
    .title { font-family: Inter, sans-serif; font-size:18px; font-weight:bold; }
    .label { font-family: Inter, sans-serif; font-size:14px; font-weight:bold; }
    .text { font-family: Inter, sans-serif; font-size:12px; }
  </style>

  <!-- Header -->
  <text x="50" y="40" class="title">PBPE Marketplace — Architecture Overview</text>

  <!-- Planetary Health OS -->
  <rect x="50" y="60" width="1150" height="80" class="box" fill="#eef5ff"/>
  <text x="70" y="90" class="label">Planetary Health OS</text>
  <text x="70" y="115" class="text">Intent / Source / Webhook / Connect / Checkout</text>

  <!-- Marketplace Container -->
  <rect x="50" y="160" width="1150" height="580" class="box" fill="#fafafa"/>
  <text x="70" y="190" class="title">PBPE Marketplace</text>

  <!-- Financial Products -->
  <rect x="70" y="220" width="330" height="140" class="box"/>
  <text x="85" y="245" class="label">1. PBPE Financial Products</text>
  <text x="85" y="265" class="text">Carbon Income Bond</text>
  <text x="85" y="280" class="text">Regenerative Agriculture Bond</text>
  <text x="85" y="295" class="text">Health Impact Bond</text>
  <text x="85" y="310" class="text">Soil / Coffee / Microbiome Credits</text>
  <text x="85" y="325" class="text">Preventive Health & Agri Protection</text>

  <!-- Impact Engine -->
  <rect x="450" y="220" width="330" height="140" class="box"/>
  <text x="465" y="245" class="label">2. PBPE Impact Engine</text>
  <text x="465" y="265" class="text">Agri / Climate / Health Intents</text>
  <text x="465" y="280" class="text">PBPE valuation & forecasting</text>
  <text x="465" y="295" class="text">Volatility & risk inputs</text>

  <!-- Registry & Ledger -->
  <rect x="830" y="220" width="330" height="140" class="box"/>
  <text x="845" y="245" class="label">3. PBPE Registry & Ledger</text>
  <text x="845" y="265" class="text">intents, pbpe_values, products</text>
  <text x="845" y="280" class="text">settlements, distributions</text>
  <text x="845" y="295" class="text">audit_trail (full traceability)</text>

  <!-- API -->
  <rect x="70" y="390" width="330" height="120" class="box"/>
  <text x="85" y="415" class="label">4. Marketplace API</text>
  <text x="85" y="435" class="text">/products, /orders, /market/ticker</text>
  <text x="85" y="450" class="text">/settlements/{product_id}</text>
  <text x="85" y="465" class="text">/registry/{pbpe_id}, /portfolio</text>

  <!-- Rating Engine -->
  <rect x="450" y="390" width="330" height="120" class="box"/>
  <text x="465" y="415" class="label">5. PBPE Risk & Rating Engine</text>
  <text x="465" y="435" class="text">IRS, DQS, RRS</text>
  <text x="465" y="450" class="text">PVI, PDP → PCRS → A/B/C/D</text>

  <!-- Settlement -->
  <rect x="830" y="390" width="330" height="120" class="box"/>
  <text x="845" y="415" class="label">6. Settlement & Distribution</text>
  <text x="845" y="435" class="text">Executes 40/40/20</text>
  <text x="845" y="450" class="text">Actor / PBPE Funds / Platform</text>

  <!-- Dashboards -->
  <rect x="70" y="540" width="1090" height="180" class="box"/>
  <text x="85" y="565" class="label">7. Dashboards</text>
  <text x="85" y="585" class="text">Investor Dashboard: portfolio, PBPE yield, risk, impact</text>
  <text x="85" y="600" class="text">Issuer Dashboard: issuance, MRV status, settlements</text>
  <text x="85" y="615" class="text">Impact Views: CO₂, soil, MBT55, medical cost, water</text>

</svg>